<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI CHATBOAT FOR COLLEGE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #000428, #004e92);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.chat-container {
  width: 400px;
  max-width: 95%;
  height: 600px;
  background: #0b0b0b;
  border-radius: 25px;
  box-shadow: 0 0 30px rgba(0, 191, 255, 0.4);
  display: flex;
  flex-direction: column;
  position: relative;
}

header {
  background: #0a3d62;
  color: #fff;
  padding: 18px;
  text-align: center;
  font-weight: 600;
  text-shadow: 1px 1px 4px #00bfff;
}

.chat-box {
  flex-grow: 1;
  padding: 15px;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.chat-box::-webkit-scrollbar { display: none; }

.message {
  padding: 12px 16px;
  border-radius: 15px;
  max-width: 75%;
  word-wrap: break-word;
  margin-bottom: 8px;
  animation: fadeIn 0.3s forwards;
}

.message.user {
  background: none;
  color: #ffffff;
  align-self: flex-end;
  box-shadow: none;
  padding: 4px 0;
}

.message.bot {
  background: none;
  color: #ffffff;
  align-self: flex-start;
  box-shadow: none;
  padding: 4px 0;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.thinking {
  display: flex;
  align-items: center;
  margin-left: 10px;
  margin-bottom: 10px;
}

.dot {
  width: 8px;
  height: 8px;
  background-color: #1e90ff;
  border-radius: 50%;
  margin: 0 3px;
  opacity: 0.6;
  animation: blink 1s infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.3); }
}

.input-area {
  display: flex;
  border-top: 1px solid #333;
  background: #111;
  border-radius: 0 0 25px 25px;
}

.input-area input {
  flex: 1;
  padding: 15px;
  border: none;
  outline: none;
  background: #222;
  color: #fff;
  font-size: 16px;
  border-radius: 0 0 0 25px;
}

.input-area button {
  border: none;
  background: #0a3d62;
  color: #fff;
  padding: 0 20px;
  font-size: 18px;
  cursor: pointer;
  border-radius: 0 0 25px 0;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.input-area button:hover {
  background: #1e90ff;
  box-shadow: 0 0 15px #1e90ff, 0 0 30px #00bfff;
  transform: scale(1.05);
}

@media (max-width: 480px) {
  .chat-container { width: 95%; height: 90vh; }
}
</style>
</head>
<body>
<div class="chat-container">
  <header>🤖 AI CHATBOAT</header>
  <div id="chat-box" class="chat-box">
    <div class="message bot">Hello! I’m AI CHATBOAT. How can I help you today? 💬</div>
  </div>
  <div id="thinking" class="thinking" style="display:none;">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="input-area">
    <input id="user-input" type="text" placeholder="Type your question..." />
    <button id="send-btn">➤</button>
  </div>
</div>

<audio id="send-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-message-pop-alert-2354.mp3"></audio>

<script>
const chatBox = document.getElementById('chat-box');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const thinking = document.getElementById('thinking');
const sendSound = document.getElementById('send-sound');

// 🔹 FAQs
const faqs = [
    { q:["hii"], a:"Hello,How Are You "},
  { q:["college name","name of college"], a:"ALLEN HOUSE Institute of Technology."},
  { q:["college location","where is college","college address"], a:"Plot No. 176 Kulgaon Road, Rooma Kanpur, 208008 Uttar Pradesh, India."},
  { q:["official website","website"], a:"https://allenhouse.ac.in"},
  { q:["working hours","college timings","college time","timings"], a:"Monday to Friday, 9:00 AM to 5:00 PM."},
  { q:["government or private","type of college"], a:"Private."},
  { q:["established","college established","founded"], a:"In 2008."},
  { q:["affiliated university","affiliation"], a:"Yes, affiliated to AKTU and CSJMU."},
  { q:["AICTE approved","approved by AICTE"], a:"Yes."},
  { q:["golden retierver kon hai"], a:"m"},
  { q:["ragging allowed"], a:"No, ragging is strictly prohibited."},
  { q:[" how to contact the college","phone","email"], a:"Call +91 8127505222 or +91 8127405222. Email: info@allenhouse.ac.in"},
  { q:["principal","director","hod of cs"], a:"Our HOD is DR Sudhir."},
  { q:["admission eligibility"], a:"10th & 12th marksheets required; entrance exam score."},
  { q:["hostel are available ","hostel"], a:"Hostel available for boys & girls; ₹80,000/year; follow discipline rules."},
  { q:["campus tour","visit campus"], a:"Yes, you can visit with prior appointment."},
  { q:["transport","bus"], a:"INFORMATION CAN BE GAINED THROUGH MR DHEERENDRA PANDEY"},
  { q:["placement","recruiters","placement stats"], a:"90%+ placement; recruiters include top IT & Engineering companies."},
  { q:["library rules","library timing","library hours"], a:"Library open 9 AM to 5 PM; 10,000+ books available."},
  { q:["fee payment","tuition payment","fees"], a:"Fees can be paid 110000 / semester-wise; refund within 30 days."},
  { q:["scholarship eligibility","apply scholarship"], a:"Based on merit & income; apply during admission."},
  { q:["extra curricular","clubs","societies"], a:"Various clubs and events organized yearly."},
  { q:["exam schedule","results","exam dates"], a:"Check official website for updates."},
  { q:["covid","health safety"], a:"Follow campus guidelines for health & safety."},
  { q:["student support","counselling"], a:"Available for all enrolled students with prior appointment."}
];

// 🔹 Synonyms
const synonyms = {
  "location":["address","place","located","where"],
  "director":["principal","head","manager"],
  "timings":["time","hours","schedule"],
  "contact":["phone","call","number","email"],
  "admission":["apply","entrance","eligibility"],
  "hostel":["dormitory","boarding"],
  "library":["books","reading room","library hours"]
};

// 🔹 Levenshtein distance (typo tolerance)
function levenshtein(a,b){
  const m = Array(a.length+1).fill(null).map(()=>Array(b.length+1).fill(0));
  for(let i=0;i<=a.length;i++) m[i][0]=i;
  for(let j=0;j<=b.length;j++) m[0][j]=j;
  for(let i=1;i<=a.length;i++){
    for(let j=1;j<=b.length;j++){
      const cost = a[i-1]===b[j-1]?0:1;
      m[i][j]=Math.min(m[i-1][j]+1,m[i][j-1]+1,m[i-1][j-1]+cost);
    }
  }
  return m[a.length][b.length];
}

// 🔹 Event listeners
sendBtn.addEventListener('click', sendMessage);
userInput.addEventListener('keypress', e => { if(e.key==="Enter") sendMessage(); });

// 🔹 Send message
function sendMessage(){
  const text = userInput.value.trim();
  if(!text) return;
  sendSound.play();
  appendMessage(text,'user');
  userInput.value='';
  thinking.style.display='flex';
  setTimeout(()=>botReply(text.toLowerCase()),1200);
}

// 🔹 Append message
function appendMessage(msg,sender){
  const div=document.createElement('div');
  div.classList.add('message',sender);
  div.textContent=msg;
  chatBox.appendChild(div);
  chatBox.scrollTop=chatBox.scrollHeight;
}

// 🔹 Advanced fuzzy matching with synonyms & typo tolerance
function botReply(input){
  thinking.style.display='none';
  let bestMatch=null;
  let highestScore=0;

  for(let f of faqs){
    let score=0;
    for(let keyword of f.q){
      let words = keyword.toLowerCase().split(/\s+/);
      // include synonyms
      words = words.flatMap(w => synonyms[w]? [w,...synonyms[w]] : [w]);

      const inputWords = input.split(/\s+/);
      for(let iw of inputWords){
        for(let w of words){
          let dist = levenshtein(iw,w);
          if(dist <=2) score++;
        }
      }
    }
    if(score>highestScore){
      highestScore=score;
      bestMatch=f;
    }
  }

  if(highestScore>0) typeMessage(bestMatch.a);
  else typeMessage("Sorry, I didn’t understand that 🤔");
}

// 🔹 Type message effect
function typeMessage(text){
  const div=document.createElement('div');
  div.classList.add('message','bot');
  chatBox.appendChild(div);
  let i=0;
  const typing=setInterval(()=>{
    div.textContent+=text.charAt(i);
    i++;
    chatBox.scrollTop=chatBox.scrollHeight;
    if(i===text.length) clearInterval(typing);
  },30);
}
</script>
</body>
</html>
